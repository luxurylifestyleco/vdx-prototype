<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>VDX — Voice Interface</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #f5f5f7; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
  .phone { width: 390px; height: 844px; background: #ffffff; border-radius: 44px; padding: 20px; position: relative; box-shadow: 0 0 0 1px rgba(0,0,0,0.04), 0 20px 60px rgba(0,0,0,0.08); overflow: hidden; }
  .notch { width: 160px; height: 30px; background: #1a1a2e; border-radius: 0 0 20px 20px; position: absolute; top: 0; left: 50%; transform: translateX(-50%); z-index: 100; }
  .screen { width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; padding-top: 30px; }
  .bubble-container { position: relative; display: flex; flex-direction: column; align-items: center; gap: 12px; transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); }
  .mic-button { width: 88px; height: 88px; border-radius: 50%; border: none; cursor: pointer; position: relative; display: flex; align-items: center; justify-content: center; transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); background: #e8e8ed; z-index: 2; -webkit-tap-highlight-color: transparent; }
  .mic-button:active { transform: scale(0.92); }
  .mic-icon { width: 36px; height: 36px; color: #8e8e93; transition: all 0.3s; }
  .pulse-ring { position: absolute; width: 100%; height: 100%; border-radius: 50%; border: 2px solid rgba(108, 58, 237, 0.3); animation: none; pointer-events: none; }
  @keyframes pulse { 0% { transform: scale(1); opacity: 0.6; } 100% { transform: scale(1.6); opacity: 0; } }
  .status-text { color: #8e8e93; font-size: 15px; font-weight: 500; letter-spacing: 0.3px; min-height: 24px; transition: all 0.3s; }
  .action-desc { color: #aeaeb2; font-size: 13px; min-height: 20px; transition: all 0.3s; }
  .transcript-box { width: 100%; max-width: 320px; background: #f5f5f7; border-radius: 12px; padding: 10px 14px; min-height: 40px; display: none; align-items: center; justify-content: center; text-align: center; color: #3a3a3c; font-size: 14px; line-height: 1.4; transition: all 0.3s; }
  .transcript-box.visible { display: flex; }
  .transcript-box.interim { color: #aeaeb2; font-style: italic; }
  .state-idle .mic-button { background: #e8e8ed; }
  .state-idle .mic-icon { color: #8e8e93; }
  .state-idle .pulse-ring { animation: none; opacity: 0; }
  .state-listening .mic-button { background: #6c3aed; box-shadow: 0 0 30px rgba(108, 58, 237, 0.3); }
  .state-listening .mic-icon { color: #fff; }
  .state-listening .pulse-ring { animation: pulse 1.5s ease-out infinite; }
  .state-listening .status-text { color: #6c3aed; }
  .state-thinking .mic-button { background: #e8e8ed; border: 2px solid #6c3aed; }
  .state-thinking .mic-icon { color: #6c3aed; }
  .state-thinking .status-text { color: #6c3aed; }
  .spinner { width: 24px; height: 24px; border: 2.5px solid rgba(108, 58, 237, 0.2); border-top-color: #6c3aed; border-radius: 50%; animation: spin 0.8s linear infinite; display: none; }
  .state-thinking .spinner { display: block; }
  .state-thinking .mic-icon { display: none; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .state-executing .mic-button { background: linear-gradient(135deg, #6c3aed, #4a1db8); }
  .state-executing .mic-icon { color: #fff; }
  .state-executing .status-text { color: #6c3aed; }
  .progress-ring { position: absolute; width: 100%; height: 100%; border-radius: 50%; border: 2px solid transparent; border-top-color: rgba(108, 58, 237, 0.4); animation: spin 0.6s linear infinite; pointer-events: none; }
  .state-executing .progress-ring { display: block; }
  .state-executing .pulse-ring { display: none; }
  .state-done .mic-button { background: #22c55e; box-shadow: 0 0 30px rgba(34, 197, 94, 0.3); }
  .state-done .mic-icon { color: #fff; }
  .state-done .status-text { color: #22c55e; }
  .checkmark { width: 28px; height: 28px; display: none; }
  .state-done .checkmark { display: block; }
  .state-done .mic-icon { display: none; }
  .state-error .mic-button { background: #f59e0b; box-shadow: 0 0 30px rgba(245, 158, 11, 0.3); }
  .state-error .mic-icon { color: #fff; }
  .state-error .status-text { color: #f59e0b; }
  .state-confirm .mic-button { background: #6c3aed; box-shadow: 0 0 30px rgba(108, 58, 237, 0.3); }
  .state-confirm .mic-icon { color: #fff; }
  .state-confirm .status-text { color: #6c3aed; }
  .state-confirm .pulse-ring { animation: pulse 1.5s ease-out infinite; }
  .card { width: 100%; max-width: 320px; border-radius: 16px; padding: 20px; display: none; opacity: 0; transform: translateY(10px); transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); }
  .card.visible { display: block; opacity: 1; transform: translateY(0); }
  .card .icon { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-bottom: 12px; }
  .card .icon svg { width: 18px; height: 18px; }
  .card .title { font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
  .card .message { font-size: 16px; line-height: 1.5; font-weight: 500; }
  .card .receipt { margin-top: 14px; padding-top: 14px; border-top: 1px solid #e5e5e5; }
  .card .receipt-item { font-size: 13px; padding: 3px 0; display: flex; align-items: center; gap: 8px; }
  .card .receipt-item::before { content: "✓"; font-weight: bold; }
  .card .receipt-item.pending::before { content: "○"; color: #d4d4d8; }
  .card .receipt-item.pending { color: #aeaeb2; }
  .confirm-card { background: #f0fdf4; border: 1px solid #bbf7d0; }
  .confirm-card .icon { background: #dcfce7; }
  .confirm-card .icon svg { color: #22c55e; }
  .confirm-card .title { color: #16a34a; }
  .confirm-card .message { color: #1a1a2e; }
  .confirm-card .receipt-item::before { color: #22c55e; }
  .error-card { background: #fffbeb; border: 1px solid #fde68a; }
  .error-card .icon { background: #fef3c7; }
  .error-card .icon svg { color: #f59e0b; }
  .error-card .title { color: #d97706; }
  .error-card .message { font-size: 14px; line-height: 1.5; }
  .error-card .message .understood { color: #6b7280; }
  .error-card .message .retry { color: #d97706; font-weight: 500; }
  .confirm-action-card { background: #f0eeff; border: 1px solid #c4b5fd; }
  .confirm-action-card .icon { background: #ede9fe; }
  .confirm-action-card .icon svg { color: #6c3aed; }
  .confirm-action-card .title { color: #6c3aed; }
  .confirm-action-card .message { color: #1a1a2e; }
  .confirm-action-card .actions { display: flex; gap: 8px; margin-top: 14px; }
  .confirm-action-card .actions button { flex: 1; padding: 10px; border-radius: 10px; border: none; font-size: 14px; font-weight: 600; cursor: pointer; }
  .confirm-action-card .actions .btn-confirm { background: #6c3aed; color: #fff; }
  .confirm-action-card .actions .btn-cancel { background: #f5f5f7; color: #6b7280; }
  .confidence-badge { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 10px; font-weight: 500; margin-top: 8px; }
  .confidence-high { background: #dcfce7; color: #16a34a; }
  .confidence-med { background: #fef3c7; color: #d97706; }
  .confidence-low { background: #fee2e2; color: #dc2626; }
  .carousel { width: 100%; max-width: 320px; margin-top: 20px; display: flex; flex-direction: column; align-items: center; gap: 8px; transition: opacity 0.3s; }
  .carousel.hidden { opacity: 0; pointer-events: none; }
  .carousel-label { color: #aeaeb2; font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 4px; }
  .carousel-example { background: #f5f5f7; border: 1px solid #e5e5ea; border-radius: 12px; padding: 12px 20px; color: #3a3a3c; font-size: 14px; cursor: pointer; transition: all 0.3s; text-align: center; width: 100%; -webkit-tap-highlight-color: transparent; }
  .carousel-example:active { background: #f0eeff; border-color: #c4b5fd; }
  .carousel-dots { display: flex; gap: 6px; margin-top: 4px; }
  .carousel-dot { width: 6px; height: 6px; border-radius: 50%; background: #d4d4d8; transition: all 0.3s; }
  .carousel-dot.active { background: #6c3aed; width: 18px; border-radius: 3px; }
  .action-button { display: inline-block; margin-top: 12px; padding: 10px 20px; border-radius: 10px; border: none; font-size: 14px; font-weight: 600; cursor: pointer; background: #6c3aed; color: #fff; text-decoration: none; text-align: center; width: 100%; }
  .action-button:active { background: #5a2fd0; }
  .number-input-row { margin-top: 12px; display: none; gap: 8px; width: 100%; }
  .number-input-row.visible { display: flex; }
  .number-input-row input { flex: 1; padding: 10px 14px; border: 1px solid #c4b5fd; border-radius: 10px; font-size: 14px; outline: none; }
  .number-input-row input:focus { border-color: #6c3aed; }
  .number-input-row button { padding: 10px 16px; background: #6c3aed; color: #fff; border: none; border-radius: 10px; font-weight: 600; font-size: 14px; cursor: pointer; white-space: nowrap; }
  .browser-warning { position: absolute; bottom: 20px; left: 20px; right: 20px; background: #fef3c7; border: 1px solid #fde68a; border-radius: 10px; padding: 10px 14px; color: #92400e; font-size: 12px; text-align: center; display: none; }
  .onboarding { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: #fff; z-index: 200; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 30px; text-align: center; transition: opacity 0.5s; }
  .onboarding.hidden { opacity: 0; pointer-events: none; }
  .onboarding h1 { font-size: 28px; color: #1a1a2e; margin-bottom: 8px; }
  .onboarding p { color: #6b7280; font-size: 15px; line-height: 1.6; margin-bottom: 24px; }
  .onboarding .step-dots { display: flex; gap: 8px; margin-bottom: 24px; }
  .onboarding .step-dot { width: 8px; height: 8px; border-radius: 50%; background: #d4d4d8; transition: all 0.3s; }
  .onboarding .step-dot.active { background: #6c3aed; width: 24px; border-radius: 4px; }
  .onboarding .btn-primary { padding: 14px 32px; border-radius: 12px; border: none; background: #6c3aed; color: #fff; font-size: 16px; font-weight: 600; cursor: pointer; width: 100%; max-width: 280px; }
  .onboarding .btn-primary:active { background: #5a2fd0; }
  .onboarding .btn-skip { background: none; border: none; color: #aeaeb2; font-size: 14px; margin-top: 12px; cursor: pointer; }
  .onboarding .feature-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; max-width: 320px; margin-bottom: 20px; }
  .onboarding .feature-item { background: #f5f5f7; border-radius: 12px; padding: 14px 10px; text-align: center; }
  .onboarding .feature-item .emoji { font-size: 24px; margin-bottom: 4px; }
  .onboarding .feature-item .label { font-size: 12px; color: #3a3a3c; font-weight: 500; }
  .onboarding .name-input { width: 100%; max-width: 280px; padding: 14px 16px; border: 2px solid #e5e5ea; border-radius: 12px; font-size: 16px; text-align: center; outline: none; margin-bottom: 16px; }
  .onboarding .name-input:focus { border-color: #6c3aed; }
  .onboarding .privacy-box { background: #f0fdf4; border: 1px solid #bbf7d0; border-radius: 12px; padding: 16px; margin-bottom: 20px; text-align: left; max-width: 320px; width: 100%; }
  .onboarding .privacy-box .title { color: #16a34a; font-weight: 600; font-size: 13px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
  .onboarding .privacy-box p { color: #6b7280; font-size: 13px; margin-bottom: 0; }
  .onboarding .privacy-box .check { color: #22c55e; }
  .onboarding .contact-tags { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; max-width: 320px; margin-bottom: 16px; }
  .onboarding .contact-tag { padding: 8px 16px; border-radius: 20px; border: 1px solid #e5e5ea; background: #fff; font-size: 13px; cursor: pointer; transition: all 0.2s; -webkit-tap-highlight-color: transparent; }
  .onboarding .contact-tag.selected { background: #f0eeff; border-color: #6c3aed; color: #6c3aed; }
  .onboarding .contact-tag:active { transform: scale(0.95); }
  .onboarding .mic-test { width: 64px; height: 64px; border-radius: 50%; background: #e8e8ed; display: flex; align-items: center; justify-content: center; margin: 0 auto 16px; cursor: pointer; transition: all 0.3s; }
  .onboarding .mic-test.active { background: #6c3aed; box-shadow: 0 0 20px rgba(108, 58, 237, 0.3); }
  .onboarding .mic-test svg { width: 28px; height: 28px; color: #8e8e93; }
  .onboarding .mic-test.active svg { color: #fff; }
  .onboarding .test-result { font-size: 14px; color: #6b7280; min-height: 24px; margin-bottom: 16px; }
  .onboarding .test-result.success { color: #22c55e; }
  .onboarding .test-result.error { color: #dc2626; }
  .onboarding .welcome-badge { font-size: 48px; margin-bottom: 16px; }
  .onboarding .subtitle { color: #aeaeb2; font-size: 13px; margin-bottom: 24px; }
  .onboarding .privacy-list { text-align: left; max-width: 280px; margin-bottom: 20px; }
  .onboarding .privacy-list li { color: #6b7280; font-size: 14px; padding: 4px 0; list-style: none; }
  .onboarding .privacy-list li::before { content: "✓ "; color: #22c55e; font-weight: bold; }
  .onboarding .voice-preview { background: #f5f5f7; border-radius: 12px; padding: 16px; max-width: 320px; width: 100%; margin-bottom: 16px; }
  .onboarding .voice-preview .heard { color: #aeaeb2; font-size: 13px; margin-bottom: 4px; }
  .onboarding .voice-preview .text { color: #3a3a3c; font-size: 15px; font-weight: 500; }
  .onboarding .voice-preview .action { color: #6c3aed; font-size: 14px; margin-top: 8px; }
  .onboarding .voice-preview .check { color: #22c55e; font-size: 14px; margin-top: 8px; }
  @media (max-width: 480px) { .phone { width: 100%; height: 100vh; border-radius: 0; padding: 12px; } }
</style>
</head>
<body>

<div class="phone">
  <div class="notch"></div>
  <div class="screen">

    <!-- Onboarding -->
    <div class="onboarding" id="onboarding">
      <div id="onboardingContent"></div>
    </div>

    <!-- Main UI -->
    <div class="bubble-container state-idle" id="bubble">
      <button class="mic-button" id="micBtn">
        <div class="pulse-ring"></div>
        <div class="progress-ring"></div>
        <svg class="mic-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
          <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
          <line x1="12" y1="19" x2="12" y2="23"/>
          <line x1="8" y1="23" x2="16" y2="23"/>
        </svg>
        <div class="spinner"></div>
        <svg class="checkmark" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
      </button>
      <div class="status-text" id="statusText">Tap to speak</div>
      <div class="action-desc" id="actionDesc"></div>
    </div>

    <div class="transcript-box" id="transcriptBox"></div>

    <!-- Result Card -->
    <div class="card confirm-card" id="confirmCard">
      <div class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></div>
      <div class="title">Done</div>
      <div class="message" id="confirmMessage">Done.</div>
      <div class="receipt" id="confirmReceipt"></div>
      <div class="confidence-badge" id="confidenceBadge"></div>
      <a class="action-button" id="actionButton" href="#" target="_blank" style="display:none;">Open</a>
      <div class="number-input-row" id="numberInputRow">
        <input type="tel" id="numberInput" placeholder="Enter phone number..." inputmode="numeric">
        <button id="numberSaveBtn">Save</button>
      </div>
    </div>

    <!-- Confirm Action Card -->
    <div class="card confirm-action-card" id="confirmActionCard">
      <div class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg></div>
      <div class="title">Confirm</div>
      <div class="message" id="confirmActionMessage">Send message?</div>
      <div class="receipt" id="confirmActionReceipt"></div>
      <div class="number-input-row" id="confirmNumberRow" style="margin-top:0;">
        <input type="tel" id="confirmNumberInput" placeholder="Enter phone number..." inputmode="numeric">
        <button id="confirmNumberSaveBtn" style="padding:10px;">Save</button>
      </div>
      <div class="actions">
        <button class="btn-confirm" id="btnConfirm">✓ Confirm</button>
        <button class="btn-cancel" id="btnCancel">✕ Cancel</button>
      </div>
    </div>

    <!-- Error Card -->
    <div class="card error-card" id="errorCard">
      <div class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg></div>
      <div class="title">Didn't quite get that</div>
      <div class="message" id="errorMessage">Try saying something below</div>
    </div>

    <!-- Carousel -->
    <div class="carousel" id="carousel">
      <div class="carousel-label" id="carouselLabel">Try saying</div>
      <div class="carousel-example" id="carouselText">"Call Eva"</div>
      <div class="carousel-dots" id="carouselDots"></div>
    </div>

    <div class="browser-warning" id="browserWarning">
      ⚠️ Speech recognition not available. Try Chrome on Android.
    </div>

  </div>
</div>

<script>
  // ===== DOM REFS =====
  const bubble = document.getElementById('bubble');
  const statusText = document.getElementById('statusText');
  const actionDesc = document.getElementById('actionDesc');
  const confirmCard = document.getElementById('confirmCard');
  const confirmActionCard = document.getElementById('confirmActionCard');
  const errorCard = document.getElementById('errorCard');
  const carousel = document.getElementById('carousel');
  const carouselText = document.getElementById('carouselText');
  const carouselLabel = document.getElementById('carouselLabel');
  const carouselDots = document.getElementById('carouselDots');
  const transcriptBox = document.getElementById('transcriptBox');
  const confirmMessage = document.getElementById('confirmMessage');
  const confirmReceipt = document.getElementById('confirmReceipt');
  const confirmActionMessage = document.getElementById('confirmActionMessage');
  const confirmActionReceipt = document.getElementById('confirmActionReceipt');
  const errorMessage = document.getElementById('errorMessage');
  const confidenceBadge = document.getElementById('confidenceBadge');
  const micBtn = document.getElementById('micBtn');
  const btnConfirm = document.getElementById('btnConfirm');
  const btnCancel = document.getElementById('btnCancel');
  const browserWarning = document.getElementById('browserWarning');
  const actionButton = document.getElementById('actionButton');
  const numberInputRow = document.getElementById('numberInputRow');
  const numberInput = document.getElementById('numberInput');
  const numberSaveBtn = document.getElementById('numberSaveBtn');
  const confirmNumberRow = document.getElementById('confirmNumberRow');
  const confirmNumberInput = document.getElementById('confirmNumberInput');
  const confirmNumberSaveBtn = document.getElementById('confirmNumberSaveBtn');
  const onboarding = document.getElementById('onboarding');
  const onboardingContent = document.getElementById('onboardingContent');

  // ===== STORAGE =====
  function loadJSON(key, def) { try { return JSON.parse(localStorage.getItem(key)) || def; } catch(e) { return def; } }
  function saveJSON(key, val) { localStorage.setItem(key, JSON.stringify(val)); }
  let knownContacts = loadJSON('vdx_contacts', {});
  let userName = localStorage.getItem('vdx_user_name') || '';
  let onboarded = localStorage.getItem('vdx_onboarded') === 'true';
  let pendingContactName = null;
  let pendingContactIntent = null;

  // ===== ONBOARDING =====
  let onboardingStep = 0;
  const onboardingSteps = [
    // Step 0: Welcome
    { render: () => `
      <div class="welcome-badge">🎙️</div>
      <h1>Welcome to VDX</h1>
      <p class="subtitle">The fastest way to get things done on your phone — just speak, and it happens.</p>
      <div class="feature-grid">
        <div class="feature-item"><div class="emoji">📞</div><div class="label">Call anyone</div></div>
        <div class="feature-item"><div class="emoji">💬</div><div class="label">Send messages</div></div>
        <div class="feature-item"><div class="emoji">📍</div><div class="label">Navigate</div></div>
        <div class="feature-item"><div class="emoji">🌐</div><div class="label">Search web</div></div>
        <div class="feature-item"><div class="emoji">🎵</div><div class="label">Play media</div></div>
        <div class="feature-item"><div class="emoji">📸</div><div class="label">Camera & OCR</div></div>
        <div class="feature-item"><div class="emoji">⏰</div><div class="label">Timers & alarms</div></div>
        <div class="feature-item"><div class="emoji">🚕</div><div class="label">Book a cab</div></div>
      </div>
      <button class="btn-primary" onclick="nextOnboardingStep()">Get Started</button>
    `},
    // Step 1: Your name
    { render: () => `
      <div class="welcome-badge">👋</div>
      <h1>What should I call you?</h1>
      <p>So I can personalise everything for you.</p>
      <input class="name-input" id="onboardName" value="${userName}" placeholder="Your name..." maxlength="30">
      <button class="btn-primary" onclick="saveOnboardingName()">Continue</button>
      <button class="btn-skip" onclick="nextOnboardingStep()">Skip</button>
    `},
    // Step 2: Privacy promise
    { render: () => `
      <div class="welcome-badge">🔒</div>
      <h1>Your privacy comes first</h1>
      <div class="privacy-box">
        <div class="title">What VDX does with your data</div>
        <ul class="privacy-list">
          <li>Your voice never leaves your device</li>
          <li>No recordings are stored anywhere</li>
          <li>Contacts stay on your phone</li>
          <li>No ads. No tracking. No selling data.</li>
          <li>You can delete everything anytime</li>
        </ul>
      </div>
      <button class="btn-primary" onclick="nextOnboardingStep()">I'm in</button>
    `},
    // Step 3: Add contacts
    { render: () => `
      <div class="welcome-badge">📇</div>
      <h1>Who do you call most?</h1>
      <p>Tap the people you contact often — I'll remember them.</p>
      <div class="contact-tags" id="contactTags">
        ${['Eva', 'Mom', 'Dad', 'Rahul', 'Priya', 'Vikram', 'Ananya', 'Boss'].map(n => `
          <div class="contact-tag${knownContacts[n.toLowerCase()] ? ' selected' : ''}" onclick="toggleContact('${n}')">${n}</div>
        `).join('')}
      </div>
      <button class="btn-primary" onclick="nextOnboardingStep()">Continue</button>
      <button class="btn-skip" onclick="nextOnboardingStep()">Skip</button>
    `},
    // Step 4: Mic test
    { render: () => `
      <div class="welcome-badge">🎤</div>
      <h1>Let's test your mic</h1>
      <p>Tap the mic and say something like "call Eva"</p>
      <div class="mic-test" id="micTestBtn" onclick="startOnboardingMicTest()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
          <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
          <line x1="12" y1="19" x2="12" y2="23"/>
          <line x1="8" y1="23" x2="16" y2="23"/>
        </svg>
      </div>
      <div class="test-result" id="micTestResult">Tap the mic to test</div>
      <button class="btn-primary" id="onboardFinishBtn" onclick="finishOnboarding()" style="display:none;">Start using VDX</button>
      <button class="btn-skip" onclick="finishOnboarding()">Skip test</button>
    `},
  ];

  function renderOnboarding() {
    const step = onboardingSteps[onboardingStep];
    if (!step) { finishOnboarding(); return; }
    onboardingContent.innerHTML = step.render();
    // Add step dots
    const dots = document.createElement('div');
    dots.className = 'step-dots';
    dots.innerHTML = onboardingSteps.map((_, i) =>
      `<div class="step-dot${i === onboardingStep ? ' active' : ''}"></div>`
    ).join('');
    onboardingContent.insertBefore(dots, onboardingContent.firstChild);
  }

  function nextOnboardingStep() {
    onboardingStep++;
    renderOnboarding();
  }

  function saveOnboardingName() {
    const name = document.getElementById('onboardName').value.trim();
    if (name) { userName = name; localStorage.setItem('vdx_user_name', name); }
    nextOnboardingStep();
  }

  function toggleContact(name) {
    const key = name.toLowerCase();
    if (knownContacts[key]) {
      delete knownContacts[key];
    } else {
      knownContacts[key] = '';
    }
    saveJSON('vdx_contacts', knownContacts);
    // Re-render contact tags
    const container = document.getElementById('contactTags');
    if (container) {
      container.innerHTML = ['Eva', 'Mom', 'Dad', 'Rahul', 'Priya', 'Vikram', 'Ananya', 'Boss']
        .map(n => `<div class="contact-tag${knownContacts[n.toLowerCase()] ? ' selected' : ''}" onclick="toggleContact('${n}')">${n}</div>`).join('');
    }
  }

  let onboardingRecognition = null;
  function startOnboardingMicTest() {
    const btn = document.getElementById('micTestBtn');
    const result = document.getElementById('micTestResult');
    const finishBtn = document.getElementById('onboardFinishBtn');
    if (!window.SpeechRecognition && !window.webkitSpeechRecognition) {
      result.className = 'test-result error';
      result.textContent = 'Speech not available on this browser';
      finishBtn.style.display = 'block';
      return;
    }
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    onboardingRecognition = new SR();
    onboardingRecognition.lang = 'en-US';
    onboardingRecognition.interimResults = true;
    onboardingRecognition.maxAlternatives = 1;

    btn.classList.add('active');
    result.className = 'test-result';
    result.textContent = 'Listening...';

    onboardingRecognition.onresult = (e) => {
      let final = '';
      for (let i = e.resultIndex; i < e.results.length; i++) {
        if (e.results[i].isFinal) final += e.results[i][0].transcript;
      }
      if (final) {
        result.className = 'test-result success';
        result.textContent = `Heard: "${final}" ✓`;
        finishBtn.style.display = 'block';
        btn.classList.remove('active');
        onboardingRecognition.stop();
      }
    };
    onboardingRecognition.onerror = () => {
      result.className = 'test-result error';
      result.textContent = 'Mic issue — tap to try again';
      btn.classList.remove('active');
    };
    onboardingRecognition.onend = () => {
      btn.classList.remove('active');
    };
    try { onboardingRecognition.start(); } catch(e) {}
  }

  function finishOnboarding() {
    localStorage.setItem('vdx_onboarded', 'true');
    onboarded = true;
    onboarding.classList.add('hidden');
    setTimeout(() => { onboarding.style.display = 'none'; }, 500);
    speak(`Welcome${userName ? ' ' + userName : ''}! Tap the mic and tell me what to do.`);
  }

  // ===== EXAMPLES =====
  const allExamples = [
    '"Call Eva"', '"Message Eva"', '"WhatsApp Eva"',
    '"Navigate to Apollo Pharmacy"', '"Set a timer for 10 minutes"',
    '"What\'s the weather in Mumbai"', '"What\'s on my calendar today"',
    '"Open camera"', '"Set an alarm for 6am"',
    '"Search the web for news"', '"Play some music"',
    '"Read my document"', '"Describe this image"',
    '"Book a cab"', '"Turn on flashlight"',
  ];
  let exampleIndex = 0;

  function updateCarousel() {
    carouselText.textContent = allExamples[exampleIndex];
    carouselDots.innerHTML = '';
    const dotCount = Math.min(allExamples.length, 7);
    for (let i = 0; i < dotCount; i++) {
      const dot = document.createElement('div');
      dot.className = 'carousel-dot' + (i === exampleIndex % dotCount ? ' active' : '');
      carouselDots.appendChild(dot);
    }
  }
  function nextExample() {
    exampleIndex = (exampleIndex + 1) % allExamples.length;
    carouselText.textContent = allExamples[exampleIndex];
    const dotCount = Math.min(allExamples.length, 7);
    document.querySelectorAll('.carousel-dot').forEach((dot, i) => {
      dot.classList.toggle('active', i === exampleIndex % dotCount);
    });
  }

  // ===== SPEECH SYNTHESIS =====
  function speak(text) {
    window.speechSynthesis.cancel();
    const utterance = new SpeechSynthesisUtterance(text);
    utterance.rate = 0.95;
    utterance.pitch = 1.0;
    utterance.volume = 1.0;
    const voices = window.speechSynthesis.getVoices();
    const preferred = voices.find(v => v.lang.startsWith('en') && v.name.includes('Google UK'))
      || voices.find(v => v.lang.startsWith('en')) || null;
    if (preferred) utterance.voice = preferred;
    window.speechSynthesis.speak(utterance);
  }
  if (window.speechSynthesis) {
    window.speechSynthesis.getVoices();
    window.speechSynthesis.onvoiceschanged = () => { window.speechSynthesis.getVoices(); };
  }

  // ===== SPEECH RECOGNITION =====
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  let recognition = null;
  let isListening = false;
  if (SpeechRecognition) {
    recognition = new SpeechRecognition();
    recognition.continuous = false;
    recognition.interimResults = true;
    recognition.lang = 'en-US';
    recognition.maxAlternatives = 3;
  } else {
    browserWarning.style.display = 'block';
  }

  // ===== NUMBER COLLECTION =====
  function showNumberInput(name, intentType, detail) {
    pendingContactName = name;
    pendingContactIntent = { intent: intentType, name, detail };
    if (confirmCard.classList.contains('visible')) {
      numberInputRow.classList.add('visible');
      numberInput.placeholder = `Enter ${name}'s number...`;
      numberInput.value = knownContacts[name.toLowerCase()] || '';
      numberInput.focus();
    } else if (confirmActionCard.classList.contains('visible')) {
      confirmNumberRow.style.display = 'flex';
      confirmNumberInput.placeholder = `Enter ${name}'s number...`;
      confirmNumberInput.value = knownContacts[name.toLowerCase()] || '';
      confirmNumberInput.focus();
    }
  }
  function saveNumber() {
    const input = numberInputRow.classList.contains('visible') ? numberInput : confirmNumberInput;
    const name = pendingContactName;
    if (!name) return;
    const number = input.value.trim();
    if (!number) return;
    knownContacts[name.toLowerCase()] = number;
    saveJSON('vdx_contacts', knownContacts);
    const intent = pendingContactIntent;
    pendingContactName = null;
    pendingContactIntent = null;
    numberInputRow.classList.remove('visible');
    confirmNumberRow.style.display = 'none';
    executeAndShow(intent);
  }
  numberSaveBtn.addEventListener('click', saveNumber);
  confirmNumberSaveBtn.addEventListener('click', saveNumber);
  numberInput.addEventListener('keydown', e => { if (e.key === 'Enter') saveNumber(); });
  confirmNumberInput.addEventListener('keydown', e => { if (e.key === 'Enter') saveNumber(); });

  // ===== REAL EXECUTION ENGINE =====
  function executeRealAction(intent, name, detail) {
    const encoded = encodeURIComponent(name);
    const key = name.toLowerCase();
    const number = knownContacts[key];
    switch (intent) {
      case 'CALL': return number ? { url: `tel:${number}`, label: 'Open Dialer' } : null;
      case 'SMS': return number ? { url: `sms:${number}${detail ? '?body=' + encodeURIComponent(detail) : ''}`, label: 'Open Messages' } : null;
      case 'WHATSAPP': return number ? { url: `https://wa.me/${number.replace(/[\s+\-]/g, '')}${detail ? '?text=' + encodeURIComponent(detail) : ''}`, label: 'Open WhatsApp Chat' } : null;
      case 'NAVIGATE': return { url: `https://maps.google.com/?q=${encoded}`, label: 'Open Maps' };
      case 'TIMER': return { url: `https://www.google.com/search?q=timer+${encodeURIComponent(detail)}`, label: 'Set Timer' };
      case 'ALARM': return { url: `https://www.google.com/search?q=set+alarm+for+${encodeURIComponent(detail)}`, label: 'Set Alarm' };
      case 'WEATHER': return { url: `https://www.google.com/search?q=weather+${encoded}`, label: 'Check Weather' };
      case 'CAMERA': return null; // Can't open camera from web
      case 'CALENDAR': return { url: `https://calendar.google.com/calendar/r/eventedit`, label: 'Open Calendar' };
      case 'CALENDAR_QUERY': return { url: `https://calendar.google.com/calendar/r`, label: 'Open Calendar' };
      case 'SEARCH_WEB': return { url: `https://www.google.com/search?q=${encodeURIComponent(detail || name)}`, label: 'Search Web' };
      case 'PLAY_MEDIA': return { url: `https://www.youtube.com/results?search_query=${encodeURIComponent(detail || name)}`, label: 'Search YouTube' };
      case 'BOOK_CAB': return { url: `https://www.uber.com/`, label: 'Open Uber' };
      case 'FLASHLIGHT': return null;
      case 'READ_DOCUMENT': return null;
      case 'DESCRIBE_IMAGE': return null;
      case 'AUDIO_MESSAGE': return null;
      default: return null;
    }
  }
  function needsNumber(name) { return name && !knownContacts[name.toLowerCase()]; }

  // ===== INTENT PARSER (Louie-level features) =====
  function parseIntent(transcript) {
    const t = transcript.toLowerCase().trim();

    // CALENDAR QUERY
    if (t.match(/what(?:(?:'s| is)\s+)?(?:on|in|my)\s+(?:my\s+)?(?:today(?:'s)?\s+)?(?:calendar|schedule|agenda|events?|plans?)/) ||
        t.match(/show\s+(?:me\s+)?(?:my\s+)?(?:today(?:'s)?\s+)?(?:calendar|schedule|agenda|events?|plans?)/) ||
        t.match(/do\s+(?:i\s+)?have\s+(?:any\s+)?(?:events?|plans?|meetings?)\s+(?:for\s+)?(?:today|tomorrow)/)) {
      return { intent: 'CALENDAR_QUERY', name: '', detail: '', message: 'Opening your calendar', receipt: ['Showing today\'s events', 'Open calendar app to view'], confidence: 0.85, needsConfirm: false };
    }

    // CALL
    const callMatch = t.match(/(?:call|ring|phone|dial)\s+(?:my\s+)?(.+?)(?:\s+(?:on\s+)?(mobile|phone|work|home|office))?(?:\s|$|\.)/);
    if (callMatch) {
      const name = callMatch[1].trim().replace(/^(the|a|an)\s+/i, '');
      const phoneType = callMatch[2] || 'mobile';
      return { intent: 'CALL', name: capitalize(name), detail: phoneType, message: `Calling ${capitalize(name)}...`, receipt: [`Open dialer for ${capitalize(name)}`, needsNumber(name) ? 'Need phone number' : `Phone: ${phoneType}`], confidence: 0.9, needsConfirm: false };
    }

    // REMINDER
    const remindMatch = t.match(/(?:remind|reminder|set\s+(?:a\s+)?reminder)\s+(?:me\s+)?(?:to\s+)?(.+?)(?:\s+(?:at|in|by|for|about)\s+(.+))?$/);
    if (remindMatch) {
      const task = remindMatch[1].trim().replace(/^(to|about)\s+/i, '');
      const time = remindMatch[2] || 'now';
      return { intent: 'REMINDER', name: '', detail: `${task} at ${time}`, message: `Reminder: ${task} at ${time}`, receipt: [`Task: ${task}`, `Time: ${time}`], confidence: 0.85, needsConfirm: false };
    }

    // NAVIGATE
    const navMatch = t.match(/(?:navigate|take\s+(?:me\s+)?to|go\s+to|drive\s+to|directions\s+to|find|show\s+(?:me\s+)?(?:the\s+)?way\s+to)\s+(.+?)$/);
    if (navMatch) {
      const place = navMatch[1].trim().replace(/^(the|a|an)\s+/i, '');
      return { intent: 'NAVIGATE', name: place, detail: '', message: `Navigating to ${capitalize(place)}`, receipt: [`Destination: ${capitalize(place)}`, 'Opening Maps'], confidence: 0.9, needsConfirm: false };
    }

    // TIMER
    const timerMatch = t.match(/(?:set\s+(?:a|an)\s+)?timer\s+(?:for\s+)?(.+?)$/);
    if (timerMatch) return { intent: 'TIMER', name: '', detail: timerMatch[1].trim(), message: `Timer set for ${timerMatch[1].trim()}`, receipt: [`Duration: ${timerMatch[1].trim()}`], confidence: 0.9, needsConfirm: false };
    const durationMatch = t.match(/^(.+?)\s+(minutes|seconds|mins|secs)\s*$/);
    if (durationMatch) return { intent: 'TIMER', name: '', detail: `${durationMatch[1]} ${durationMatch[2]}`, message: `Timer set for ${durationMatch[1]} ${durationMatch[2]}`, receipt: [`Duration: ${durationMatch[1]} ${durationMatch[2]}`], confidence: 0.85, needsConfirm: false };

    // ALARM
    const alarmMatch = t.match(/(?:set\s+(?:an\s+)?|create\s+(?:an\s+)?)?alarm\s+(?:for\s+)?(.+?)$|wake\s+(?:me\s+)?up\s+(?:at\s+)?(.+?)$/);
    if (alarmMatch) {
      const time = alarmMatch[1] || alarmMatch[2] || 'morning';
      return { intent: 'ALARM', name: '', detail: time, message: `Alarm set for ${time}`, receipt: [`Time: ${time}`], confidence: 0.85, needsConfirm: false };
    }

    // WHATSAPP
    const waMatch = t.match(/(?:whatsapp|wa)\s+(.+?)(?:\s+(?:saying|that|about|with|message)\s+(.+))?$/);
    if (waMatch) {
      const name = waMatch[1].trim().replace(/^(my|the|a)\s+/i, '');
      const msg = waMatch[2] || '';
      return { intent: 'WHATSAPP', name: capitalize(name), detail: msg, message: `WhatsApp: ${capitalize(name)}`, receipt: [`To: ${capitalize(name)}`, msg ? `Message: "${msg}"` : 'Opening chat'], confidence: 0.8, needsConfirm: true };
    }

    // SMS
    const smsMatch = t.match(/(?:send|text|message)\s+(?:(?:a\s+)?(?:message|text)\s+)?(?:to\s+)?(.+?)(?:\s+(?:saying|that|about|with)\s+(.+))?$/);
    if (smsMatch) {
      const name = smsMatch[1].trim().replace(/^(my|the|a)\s+/i, '');
      const msg = smsMatch[2] || '';
      return { intent: 'SMS', name: capitalize(name), detail: msg, message: `Message ${capitalize(name)}`, receipt: [`To: ${capitalize(name)}`, msg ? `Message: "${msg}"` : 'Opening messages'], confidence: 0.8, needsConfirm: true };
    }

    // CALENDAR
    const calMatch = t.match(/(?:create|add|schedule|set)\s+(?:a\s+)?(?:calendar\s+)?(?:event|meeting|appointment)\s+(?:for\s+)?(.+?)(?:\s+(?:at|on|for)\s+(.+))?$/);
    if (calMatch) {
      const title = calMatch[1].trim();
      const time = calMatch[2] || 'tomorrow';
      return { intent: 'CALENDAR', name: '', detail: `${title} on ${time}`, message: `Event: ${title} on ${time}`, receipt: [`Event: ${title}`, `When: ${time}`], confidence: 0.8, needsConfirm: false };
    }

    // WEATHER
    const weatherMatch = t.match(/(?:what(?:'s| is)\s+)?(?:the\s+)?(?:weather|temperature|forecast)(?:\s+(?:in|at|for|like)\s+(.+?))?(?:\s|$|\.|\?)/);
    if (weatherMatch) {
      const place = weatherMatch[1] || 'your location';
      return { intent: 'WEATHER', name: place, detail: '', message: `Weather for ${capitalize(place)}`, receipt: [`Location: ${capitalize(place)}`, 'Opening weather'], confidence: 0.85, needsConfirm: false };
    }

    // CAMERA
    if (t.match(/(?:open|launch|start)\s+(?:the\s+)?camera|take\s+(?:a\s+)?(?:photo|picture|selfie)/)) {
      return { intent: 'CAMERA', name: '', detail: '', message: 'Opening camera', receipt: ['Opening camera app'], confidence: 0.9, needsConfirm: false };
    }

    // ===== LOUIE-LEVEL FEATURES =====

    // SEARCH WEB — "search the web for X", "search for X", "google X", "look up X"
    const searchMatch = t.match(/(?:search\s+(?:the\s+)?(?:web\s+)?(?:for\s+)?|google\s+|look\s+up\s+|find\s+(?:info|information|about)\s+)(.+?)$/);
    if (searchMatch) {
      const query = searchMatch[1].trim();
      return { intent: 'SEARCH_WEB', name: query, detail: query, message: `Searching for "${query}"`, receipt: [`Query: ${query}`, 'Opening search results'], confidence: 0.9, needsConfirm: false };
    }
    // Also catch "what is X", "who is X", "where is X" as web search
    const qaMatch = t.match(/^(?:what|who|where|when|why|how)\s+(?:is|are|was|were|does|do|can|will)\s+(.+?)$/);
    if (qaMatch && !t.match(/weather|calendar|schedule|temperature/)) {
      const query = qaMatch[1].trim();
      return { intent: 'SEARCH_WEB', name: query, detail: query, message: `Searching for "${query}"`, receipt: [`Query: ${query}`, 'Opening search results'], confidence: 0.8, needsConfirm: false };
    }

    // PLAY MEDIA — "play music", "play some music", "play songs", "play video", "play [song name]"
    const playMatch = t.match(/(?:play|listen\s+to|watch)\s+(.+?)$/);
    if (playMatch) {
      const media = playMatch[1].trim();
      return { intent: 'PLAY_MEDIA', name: media, detail: media, message: `Playing "${capitalize(media)}"`, receipt: [`Searching for: ${capitalize(media)}`, 'Opening media player'], confidence: 0.85, needsConfirm: false };
    }

    // BOOK CAB — "book a cab", "book a taxi", "book an Uber", "get a ride", "call a cab"
    if (t.match(/book\s+(?:a|an|me)\s+(?:cab|taxi|uber|ride|car)|get\s+(?:a|me\s+a)\s+(?:cab|taxi|uber|ride)|call\s+(?:a|me\s+a)\s+(?:cab|taxi|uber)/)) {
      return { intent: 'BOOK_CAB', name: '', detail: '', message: 'Booking a cab', receipt: ['Opening Uber', 'Finding nearby cabs'], confidence: 0.85, needsConfirm: false };
    }

    // FLASHLIGHT — "turn on flashlight", "turn off flashlight", "flashlight on", "flashlight off"
    if (t.match(/flashlight|torch|flash\s+light/)) {
      const state = t.match(/on|enable|start/) ? 'on' : (t.match(/off|disable|stop/) ? 'off' : 'on');
      return { intent: 'FLASHLIGHT', name: '', detail: state, message: `Flashlight turned ${state}`, receipt: [`Flashlight: ${state}`], confidence: 0.9, needsConfirm: false };
    }

    // READ DOCUMENT — "read my document", "read PDF", "read this document", "read aloud"
    if (t.match(/read\s+(?:my\s+)?(?:document|pdf|file|this|aloud|out\s+loud)/)) {
      return { intent: 'READ_DOCUMENT', name: '', detail: '', message: 'Ready to read a document', receipt: ['Select a document to read', 'I\'ll read it aloud'], confidence: 0.8, needsConfirm: false };
    }

    // DESCRIBE IMAGE / OCR — "describe this image", "read text from image", "OCR this", "what's in this image"
    if (t.match(/describe\s+(?:this\s+)?(?:image|picture|photo)|read\s+(?:text\s+)?(?:from\s+)?(?:this\s+)?image|ocr|what(?:'s| is)\s+(?:in|on)\s+(?:this\s+)?(?:image|picture|photo)/)) {
      return { intent: 'DESCRIBE_IMAGE', name: '', detail: '', message: 'Analyzing image', receipt: ['Select an image', 'I\'ll describe what I see'], confidence: 0.8, needsConfirm: false };
    }

    // AUDIO MESSAGE — "send audio message", "record audio", "send voice message"
    if (t.match(/audio\s+message|voice\s+message|record\s+(?:an?\s+)?(?:audio|voice)/)) {
      return { intent: 'AUDIO_MESSAGE', name: '', detail: '', message: 'Ready to record audio', receipt: ['Recording audio message', 'Tap to send'], confidence: 0.8, needsConfirm: false };
    }

    // Unknown
    return null;
  }

  function capitalize(s) { if (!s) return s; return s.charAt(0).toUpperCase() + s.slice(1); }

  // ===== STATE MANAGEMENT =====
  let currentState = 'idle';
  let autoResetTimer = null;
  let pendingIntent = null;

  const stateConfig = {
    idle:      { status: 'Tap to speak', action: '', showCarousel: true, showConfirm: false, showConfirmAction: false, showError: false },
    listening: { status: 'Listening...', action: '', showCarousel: false, showConfirm: false, showConfirmAction: false, showError: false },
    thinking:  { status: 'On it...', action: '', showCarousel: false, showConfirm: false, showConfirmAction: false, showError: false },
    executing: { status: '', action: '', showCarousel: false, showConfirm: false, showConfirmAction: false, showError: false },
    done:      { status: 'Done', action: '', showCarousel: false, showConfirm: true, showConfirmAction: false, showError: false },
    error:     { status: 'Didn\'t quite get that', action: '', showCarousel: false, showConfirm: false, showConfirmAction: false, showError: true },
    confirm:   { status: 'Confirm?', action: '', showCarousel: false, showConfirm: false, showConfirmAction: true, showError: false },
  };

  function setState(state, intentResult) {
    if (autoResetTimer) { clearTimeout(autoResetTimer); autoResetTimer = null; }
    currentState = state;
    const config = stateConfig[state];
    bubble.className = 'bubble-container ' + stateClasses(state);
    statusText.textContent = config.status;
    actionDesc.textContent = config.action;
    carousel.classList.toggle('hidden', !config.showCarousel);
    confirmCard.classList.toggle('visible', config.showConfirm);
    confirmActionCard.classList.toggle('visible', config.showConfirmAction);
    errorCard.classList.toggle('visible', config.showError);
    actionButton.style.display = 'none';
    numberInputRow.classList.remove('visible');
    confirmNumberRow.style.display = 'none';
    if (state !== 'listening') transcriptBox.classList.remove('visible', 'interim');

    if (state === 'done' && intentResult) {
      confirmMessage.textContent = intentResult.message;
      confirmReceipt.innerHTML = intentResult.receipt.map(r => `<div class="receipt-item">${r}</div>`).join('');
      const conf = intentResult.confidence || 0.9;
      let badgeClass = 'confidence-high', badgeText = 'High confidence';
      if (conf < 0.7) { badgeClass = 'confidence-low'; badgeText = 'Low confidence'; }
      else if (conf < 0.85) { badgeClass = 'confidence-med'; badgeText = 'Medium confidence'; }
      confidenceBadge.className = 'confidence-badge ' + badgeClass;
      confidenceBadge.textContent = badgeText;

      if ((intentResult.intent === 'CALL' || intentResult.intent === 'SMS' || intentResult.intent === 'WHATSAPP') && intentResult.name && needsNumber(intentResult.name)) {
        showNumberInput(intentResult.name, intentResult.intent, intentResult.detail);
        actionButton.style.display = 'none';
      } else {
        executeAndShow(intentResult);
      }
      speak(intentResult.message);
      autoResetTimer = setTimeout(() => setState('idle'), 10000);
    }

    if (state === 'confirm' && intentResult) {
      pendingIntent = intentResult;
      confirmActionMessage.textContent = intentResult.message;
      confirmActionReceipt.innerHTML = intentResult.receipt.map(r => `<div class="receipt-item">${r}</div>`).join('');
      if ((intentResult.intent === 'WHATSAPP' || intentResult.intent === 'SMS') && intentResult.name && needsNumber(intentResult.name)) {
        confirmNumberRow.style.display = 'flex';
        confirmNumberInput.placeholder = `Enter ${intentResult.name}'s number...`;
        confirmNumberInput.value = knownContacts[intentResult.name.toLowerCase()] || '';
      }
      speak(intentResult.message + ' — tap confirm or cancel');
    }

    if (state === 'error') {
      speak(errorMessage.textContent || errorMessage.innerText);
      autoResetTimer = setTimeout(() => setState('idle'), 5000);
    }
  }

  function executeAndShow(intentResult) {
    const action = executeRealAction(intentResult.intent, intentResult.name, intentResult.detail);
    if (action) {
      actionButton.href = action.url;
      actionButton.textContent = action.label;
      actionButton.style.display = 'block';
    }
  }

  function stateClasses(state) {
    const map = { idle: 'state-idle', listening: 'state-listening', thinking: 'state-thinking', executing: 'state-executing', done: 'state-done', error: 'state-error', confirm: 'state-confirm' };
    return map[state] || 'state-idle';
  }

  // ===== SPEECH FLOW =====
  function startListening() {
    if (!recognition || isListening) return;
    isListening = true;
    setState('listening');
    transcriptBox.textContent = '';
    transcriptBox.classList.add('visible', 'interim');
    try { recognition.start(); } catch (e) {}
  }
  function stopListening() {
    if (!recognition || !isListening) return;
    isListening = false;
    try { recognition.stop(); } catch (e) {}
  }

  if (recognition) {
    recognition.onresult = function(event) {
      let finalTranscript = '', interimTranscript = '';
      for (let i = event.resultIndex; i < event.results.length; i++) {
        if (event.results[i].isFinal) finalTranscript += event.results[i][0].transcript;
        else interimTranscript += event.results[i][0].transcript;
      }
      if (interimTranscript) { transcriptBox.textContent = `"${interimTranscript}"`; transcriptBox.classList.add('interim'); }
      if (finalTranscript) {
        transcriptBox.textContent = `"${finalTranscript}"`;
        transcriptBox.classList.remove('interim');
        handleTranscript(finalTranscript);
      }
    };
    recognition.onerror = function(event) {
      isListening = false;
      if (event.error === 'no-speech') { setState('idle'); return; }
      errorMessage.innerHTML = `<span class="understood">Microphone issue</span> — try again`;
      setState('error');
    };
    recognition.onend = function() {
      isListening = false;
      if (currentState === 'listening') setState('idle');
    };
  }

  function handleTranscript(transcript) {
    setState('thinking');
    setTimeout(() => {
      const intent = parseIntent(transcript);
      if (!intent) {
        const short = transcript.length > 30 ? transcript.substring(0, 30) + '...' : transcript;
        errorMessage.innerHTML = `
          <span class="understood">Heard "${short}"</span><br><br>
          I can do all of these:<br>
          <span class="retry">📞 "call Eva"</span><br>
          <span class="retry">💬 "text Mom saying I'm on my way"</span><br>
          <span class="retry">🌐 "search the web for news"</span><br>
          <span class="retry">🎵 "play some music"</span><br>
          <span class="retry">📍 "navigate to Apollo Pharmacy"</span><br>
          <span class="retry">📸 "describe this image"</span><br>
          <span class="retry">📄 "read my document"</span><br>
          <span class="retry">🚕 "book a cab"</span><br>
          <span class="retry">🔦 "turn on flashlight"</span>
        `;
        setState('error');
        return;
      }

      const execConfig = stateConfig['executing'];
      const intentLabels = {
        CALL: `Calling ${intent.name}...`, REMINDER: 'Setting reminder...', NAVIGATE: 'Opening Maps...',
        TIMER: 'Setting timer...', ALARM: 'Setting alarm...', SMS: `Preparing message for ${intent.name}...`,
        WHATSAPP: `Opening WhatsApp for ${intent.name}...`, CALENDAR: 'Creating event...',
        CALENDAR_QUERY: 'Opening calendar...', CAMERA: 'Opening camera...', WEATHER: 'Checking weather...',
        SEARCH_WEB: 'Searching the web...', PLAY_MEDIA: 'Searching for media...', BOOK_CAB: 'Booking a cab...',
        FLASHLIGHT: 'Toggling flashlight...', READ_DOCUMENT: 'Preparing to read...',
        DESCRIBE_IMAGE: 'Analyzing image...', AUDIO_MESSAGE: 'Preparing to record...',
      };
      execConfig.action = intentLabels[intent.intent] || 'Executing...';
      setState('executing');

      setTimeout(() => {
        if (intent.needsConfirm) setState('confirm', intent);
        else setState('done', intent);
      }, 800);
    }, 500);
  }

  // ===== CONFIRM / CANCEL =====
  btnConfirm.addEventListener('click', () => {
    if (pendingIntent) {
      if ((pendingIntent.intent === 'WHATSAPP' || pendingIntent.intent === 'SMS') && pendingIntent.name && needsNumber(pendingIntent.name) && !confirmNumberInput.value.trim()) {
        confirmNumberInput.focus(); return;
      }
      const num = confirmNumberInput.value.trim();
      if (num && pendingIntent.name) { knownContacts[pendingIntent.name.toLowerCase()] = num; saveJSON('vdx_contacts', knownContacts); }
      setState('done', pendingIntent);
      pendingIntent = null;
    }
  });
  btnCancel.addEventListener('click', () => {
    pendingIntent = null;
    confirmNumberRow.style.display = 'none';
    setState('idle');
    speak('Cancelled');
  });

  // ===== MIC BUTTON =====
  micBtn.addEventListener('click', () => {
    if (currentState === 'idle') startListening();
    else if (currentState === 'listening') { stopListening(); setState('idle'); }
    else setState('idle');
  });

  // ===== CAROUSEL =====
  carouselText.addEventListener('click', () => {
    if (currentState !== 'idle') return;
    const text = carouselText.textContent.replace(/^"|"$/g, '');
    transcriptBox.textContent = `"${text}"`;
    transcriptBox.classList.add('visible');
    transcriptBox.classList.remove('interim');
    handleTranscript(text);
  });
  setInterval(nextExample, 4000);

  // ===== INIT =====
  updateCarousel();
  if (!onboarded) {
    onboarding.style.display = 'flex';
    renderOnboarding();
    setState('idle');
  } else {
    onboarding.style.display = 'none';
    setState('idle');
  }
</script>
</body>
</html>
