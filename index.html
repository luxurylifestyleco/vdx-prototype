<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>VDX — Bubble Prototype</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #f5f5f7;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  }

  /* Phone frame */
  .phone {
    width: 390px;
    height: 844px;
    background: #ffffff;
    border-radius: 44px;
    padding: 20px;
    position: relative;
    box-shadow: 0 0 0 1px rgba(0,0,0,0.04), 0 20px 60px rgba(0,0,0,0.08);
    overflow: hidden;
  }

  /* Notch */
  .notch {
    width: 160px;
    height: 30px;
    background: #1a1a2e;
    border-radius: 0 0 20px 20px;
    position: absolute;
    top: 0;
    left: 50%;
    transform: translateX(-50%);
    z-index: 100;
  }

  .screen {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    padding-top: 30px;
  }

  /* ===== BUBBLE STATES ===== */

  .bubble-container {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  /* Mic button */
  .mic-button {
    width: 88px;
    height: 88px;
    border-radius: 50%;
    border: none;
    cursor: pointer;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    background: #e8e8ed;
    z-index: 2;
  }

  .mic-button:active {
    transform: scale(0.92);
  }

  .mic-icon {
    width: 36px;
    height: 36px;
    color: #8e8e93;
    transition: all 0.3s;
  }

  /* Pulse ring */
  .pulse-ring {
    position: absolute;
    width: 100%;
    height: 100%;
    border-radius: 50%;
    border: 2px solid rgba(108, 58, 237, 0.3);
    animation: none;
    pointer-events: none;
  }

  @keyframes pulse {
    0% { transform: scale(1); opacity: 0.6; }
    100% { transform: scale(1.6); opacity: 0; }
  }

  /* Status text */
  .status-text {
    color: #8e8e93;
    font-size: 15px;
    font-weight: 500;
    letter-spacing: 0.3px;
    min-height: 24px;
    transition: all 0.3s;
  }

  /* Action description */
  .action-desc {
    color: #aeaeb2;
    font-size: 13px;
    min-height: 20px;
    transition: all 0.3s;
  }

  /* ===== STATE-SPECIFIC STYLES ===== */

  /* IDLE */
  .state-idle .mic-button { background: #e8e8ed; }
  .state-idle .mic-icon { color: #8e8e93; }
  .state-idle .pulse-ring { animation: none; opacity: 0; }

  /* LISTENING */
  .state-listening .mic-button {
    background: #6c3aed;
    box-shadow: 0 0 30px rgba(108, 58, 237, 0.3);
  }
  .state-listening .mic-icon { color: #fff; }
  .state-listening .pulse-ring { animation: pulse 1.5s ease-out infinite; }
  .state-listening .status-text { color: #6c3aed; }

  /* THINKING */
  .state-thinking .mic-button {
    background: #e8e8ed;
    border: 2px solid #6c3aed;
  }
  .state-thinking .mic-icon { color: #6c3aed; }
  .state-thinking .status-text { color: #6c3aed; }

  .spinner {
    width: 24px;
    height: 24px;
    border: 2.5px solid rgba(108, 58, 237, 0.2);
    border-top-color: #6c3aed;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    display: none;
  }
  .state-thinking .spinner { display: block; }
  .state-thinking .mic-icon { display: none; }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* EXECUTING */
  .state-executing .mic-button {
    background: linear-gradient(135deg, #6c3aed, #4a1db8);
  }
  .state-executing .mic-icon { color: #fff; }
  .state-executing .status-text { color: #6c3aed; }

  .progress-ring {
    position: absolute;
    width: 100%;
    height: 100%;
    border-radius: 50%;
    border: 2px solid transparent;
    border-top-color: rgba(108, 58, 237, 0.4);
    animation: spin 0.6s linear infinite;
    pointer-events: none;
  }
  .state-executing .progress-ring { display: block; }
  .state-executing .pulse-ring { display: none; }

  /* DONE */
  .state-done .mic-button {
    background: #22c55e;
    box-shadow: 0 0 30px rgba(34, 197, 94, 0.3);
  }
  .state-done .mic-icon { color: #fff; }
  .state-done .status-text { color: #22c55e; }

  .checkmark {
    width: 28px;
    height: 28px;
    display: none;
  }
  .state-done .checkmark { display: block; }
  .state-done .mic-icon { display: none; }

  /* ERROR */
  .state-error .mic-button {
    background: #f59e0b;
    box-shadow: 0 0 30px rgba(245, 158, 11, 0.3);
  }
  .state-error .mic-icon { color: #fff; }
  .state-error .status-text { color: #f59e0b; }

  /* ===== CONFIRMATION CARD ===== */
  .confirmation-card {
    width: 100%;
    max-width: 320px;
    background: #f0fdf4;
    border: 1px solid #bbf7d0;
    border-radius: 16px;
    padding: 20px;
    display: none;
    opacity: 0;
    transform: translateY(10px);
    transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .confirmation-card.visible {
    display: block;
    opacity: 1;
    transform: translateY(0);
  }
  .confirmation-card .icon {
    width: 32px;
    height: 32px;
    background: #dcfce7;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 12px;
  }
  .confirmation-card .icon svg { width: 18px; height: 18px; color: #22c55e; }
  .confirmation-card .title {
    color: #16a34a;
    font-size: 13px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 8px;
  }
  .confirmation-card .message {
    color: #1a1a2e;
    font-size: 16px;
    line-height: 1.5;
    font-weight: 500;
  }
  .confirmation-card .receipt {
    margin-top: 14px;
    padding-top: 14px;
    border-top: 1px solid #e5e5e5;
  }
  .confirmation-card .receipt-item {
    color: #6b7280;
    font-size: 13px;
    padding: 3px 0;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .confirmation-card .receipt-item::before {
    content: "✓";
    color: #22c55e;
    font-weight: bold;
  }

  /* ===== ERROR CARD ===== */
  .error-card {
    width: 100%;
    max-width: 320px;
    background: #fffbeb;
    border: 1px solid #fde68a;
    border-radius: 16px;
    padding: 20px;
    display: none;
    opacity: 0;
    transform: translateY(10px);
    transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .error-card.visible {
    display: block;
    opacity: 1;
    transform: translateY(0);
  }
  .error-card .icon {
    width: 32px;
    height: 32px;
    background: #fef3c7;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 12px;
  }
  .error-card .icon svg { width: 18px; height: 18px; color: #f59e0b; }
  .error-card .title {
    color: #d97706;
    font-size: 13px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 8px;
  }
  .error-card .message {
    color: #1a1a2e;
    font-size: 14px;
    line-height: 1.5;
  }
  .error-card .message .understood {
    color: #6b7280;
  }
  .error-card .message .retry {
    color: #d97706;
    font-weight: 500;
  }

  /* ===== EXAMPLE CAROUSEL ===== */
  .carousel {
    width: 100%;
    max-width: 320px;
    margin-top: 24px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    transition: opacity 0.3s;
  }
  .carousel.hidden { opacity: 0; pointer-events: none; }

  .carousel-label {
    color: #aeaeb2;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin-bottom: 4px;
  }

  .carousel-example {
    background: #f5f5f7;
    border: 1px solid #e5e5ea;
    border-radius: 12px;
    padding: 12px 20px;
    color: #3a3a3c;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.3s;
    text-align: center;
    width: 100%;
  }
  .carousel-example:hover {
    background: #f0eeff;
    border-color: #c4b5fd;
    color: #1a1a2e;
  }

  .carousel-dots {
    display: flex;
    gap: 6px;
    margin-top: 4px;
  }
  .carousel-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #d4d4d8;
    transition: all 0.3s;
  }
  .carousel-dot.active { background: #6c3aed; width: 18px; border-radius: 3px; }

  /* ===== CONTROLS ===== */
  .controls {
    position: absolute;
    bottom: 40px;
    left: 20px;
    right: 20px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .state-buttons {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .state-btn {
    padding: 6px 14px;
    border-radius: 20px;
    border: 1px solid #d4d4d8;
    background: #fff;
    color: #6b7280;
    font-size: 11px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
  }
  .state-btn:hover { background: #f5f5f7; color: #3a3a3c; }
  .state-btn.active {
    background: #f0eeff;
    border-color: #6c3aed;
    color: #6c3aed;
  }
  .state-btn.active-done {
    background: #f0fdf4;
    border-color: #22c55e;
    color: #22c55e;
  }
  .state-btn.active-error {
    background: #fffbeb;
    border-color: #f59e0b;
    color: #f59e0b;
  }

  .action-row {
    display: flex;
    gap: 6px;
    justify-content: center;
  }

  .action-btn {
    padding: 8px 16px;
    border-radius: 12px;
    border: none;
    background: #6c3aed;
    color: #fff;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    flex: 1;
    max-width: 160px;
  }
  .action-btn:hover { background: #7c4aed; transform: translateY(-1px); }
  .action-btn.secondary {
    background: #f5f5f7;
    color: #6b7280;
  }
  .action-btn.secondary:hover { background: #e8e8ed; }

  /* ===== RESPONSIVE ===== */
  @media (max-width: 480px) {
    .phone { width: 100%; height: 100vh; border-radius: 0; padding: 12px; }
  }
</style>
</head>
<body>

<div class="phone">
  <div class="notch"></div>

  <div class="screen">

    <!-- Bubble Container -->
    <div class="bubble-container state-idle" id="bubble">
      <button class="mic-button" id="micBtn">
        <div class="pulse-ring"></div>
        <div class="progress-ring"></div>
        <svg class="mic-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
          <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
          <line x1="12" y1="19" x2="12" y2="23"/>
          <line x1="8" y1="23" x2="16" y2="23"/>
        </svg>
        <div class="spinner"></div>
        <svg class="checkmark" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
      </button>

      <div class="status-text" id="statusText">Tap to speak</div>
      <div class="action-desc" id="actionDesc"></div>
    </div>

    <!-- Confirmation Card -->
    <div class="confirmation-card" id="confirmCard">
      <div class="icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
      </div>
      <div class="title">Done</div>
      <div class="message" id="confirmMessage">Rahul's phone is now ringing.</div>
      <div class="receipt" id="confirmReceipt">
        <div class="receipt-item">Rahul matched from contacts</div>
        <div class="receipt-item">Calling mobile number</div>
      </div>
    </div>

    <!-- Error Card -->
    <div class="error-card" id="errorCard">
      <div class="icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/>
          <line x1="12" y1="8" x2="12" y2="12"/>
          <line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
      </div>
      <div class="title">Didn't quite get that</div>
      <div class="message" id="errorMessage">
        <span class="understood">Heard "call Rahul"</span> — try saying <span class="retry">"call Rahul mobile"</span> to specify the number
      </div>
    </div>

    <!-- Example Carousel -->
    <div class="carousel" id="carousel">
      <div class="carousel-label">Try saying</div>
      <div class="carousel-example" id="carouselText">"Remind me to call Rahul at 9pm"</div>
      <div class="carousel-dots">
        <div class="carousel-dot active"></div>
        <div class="carousel-dot"></div>
        <div class="carousel-dot"></div>
      </div>
    </div>

    <!-- Controls -->
    <div class="controls">
      <div class="state-buttons">
        <button class="state-btn active" data-state="idle">IDLE</button>
        <button class="state-btn" data-state="listening">LISTENING</button>
        <button class="state-btn" data-state="thinking">THINKING</button>
        <button class="state-btn" data-state="executing">EXECUTING</button>
        <button class="state-btn" data-state="done">DONE</button>
        <button class="state-btn" data-state="error">ERROR</button>
      </div>
      <div class="action-row">
        <button class="action-btn" id="demoBtn">▶ Demo Flow</button>
        <button class="action-btn secondary" id="resetBtn">↺ Reset</button>
      </div>
    </div>

  </div>
</div>

<script>
  const bubble = document.getElementById('bubble');
  const statusText = document.getElementById('statusText');
  const actionDesc = document.getElementById('actionDesc');
  const confirmCard = document.getElementById('confirmCard');
  const errorCard = document.getElementById('errorCard');
  const carousel = document.getElementById('carousel');
  const carouselText = document.getElementById('carouselText');
  const stateBtns = document.querySelectorAll('.state-btn');
  const demoBtn = document.getElementById('demoBtn');
  const resetBtn = document.getElementById('resetBtn');

  const examples = [
    '"Remind me to call Rahul at 9pm"',
    '"Navigate to Apollo Pharmacy"',
    '"Set a timer for 10 minutes"',
    '"Send a message to Mom"',
    '"Call an Uber to the airport"',
    '"What\'s the weather today?"',
  ];

  const stateConfig = {
    idle: {
      status: 'Tap to speak',
      action: '',
      showCarousel: true,
      showConfirm: false,
      showError: false,
    },
    listening: {
      status: 'Listening...',
      action: '',
      showCarousel: false,
      showConfirm: false,
      showError: false,
    },
    thinking: {
      status: 'On it...',
      action: '',
      showCarousel: false,
      showConfirm: false,
      showError: false,
    },
    executing: {
      status: 'Calling Rahul...',
      action: 'Dialing mobile number',
      showCarousel: false,
      showConfirm: false,
      showError: false,
    },
    done: {
      status: 'Done',
      action: '',
      showCarousel: false,
      showConfirm: true,
      showError: false,
    },
    error: {
      status: 'Didn\'t quite get that',
      action: '',
      showCarousel: false,
      showConfirm: false,
      showError: true,
    },
  };

  let currentState = 'idle';
  let exampleIndex = 0;
  let demoRunning = false;
  let demoTimer = null;

  function setState(state) {
    currentState = state;
    const config = stateConfig[state];

    // Update bubble class
    bubble.className = 'bubble-container ' + stateClasses(state);

    // Update text
    statusText.textContent = config.status;
    actionDesc.textContent = config.action;

    // Carousel
    carousel.classList.toggle('hidden', !config.showCarousel);

    // Cards
    confirmCard.classList.toggle('visible', config.showConfirm);
    errorCard.classList.toggle('visible', config.showError);

    // State buttons
    stateBtns.forEach(btn => {
      btn.classList.remove('active', 'active-done', 'active-error');
      if (btn.dataset.state === state) {
        if (state === 'done') btn.classList.add('active-done');
        else if (state === 'error') btn.classList.add('active-error');
        else btn.classList.add('active');
      }
    });
  }

  function stateClasses(state) {
    const map = {
      idle: 'state-idle',
      listening: 'state-listening',
      thinking: 'state-thinking',
      executing: 'state-executing',
      done: 'state-done',
      error: 'state-error',
    };
    return map[state] || 'state-idle';
  }

  function nextExample() {
    exampleIndex = (exampleIndex + 1) % examples.length;
    carouselText.textContent = examples[exampleIndex];
    document.querySelectorAll('.carousel-dot').forEach((dot, i) => {
      dot.classList.toggle('active', i === exampleIndex % 3);
    });
  }

  function runDemo() {
    if (demoRunning) return;
    demoRunning = true;
    demoBtn.textContent = '■ Stop';

    const flow = ['listening', 'thinking', 'executing', 'done'];
    let i = 0;

    function step() {
      if (!demoRunning) return;
      if (i >= flow.length) {
        // Auto-reset after 4s
        demoTimer = setTimeout(() => {
          setState('idle');
          demoRunning = false;
          demoBtn.textContent = '▶ Demo Flow';
        }, 4000);
        return;
      }
      setState(flow[i]);
      i++;
      demoTimer = setTimeout(step, 1500);
    }

    setState('idle');
    setTimeout(step, 500);
  }

  function stopDemo() {
    demoRunning = false;
    demoBtn.textContent = '▶ Demo Flow';
    if (demoTimer) {
      clearTimeout(demoTimer);
      demoTimer = null;
    }
  }

  // State button clicks
  stateBtns.forEach(btn => {
    btn.addEventListener('click', () => {
      stopDemo();
      setState(btn.dataset.state);
    });
  });

  // Demo button
  demoBtn.addEventListener('click', () => {
    if (demoRunning) {
      stopDemo();
      setState('idle');
    } else {
      runDemo();
    }
  });

  // Reset
  resetBtn.addEventListener('click', () => {
    stopDemo();
    setState('idle');
  });

  // Mic button click
  document.getElementById('micBtn').addEventListener('click', () => {
    if (currentState === 'idle') {
      stopDemo();
      setState('listening');
      // Auto-advance through flow
      setTimeout(() => setState('thinking'), 1200);
      setTimeout(() => setState('executing'), 2500);
      setTimeout(() => setState('done'), 3500);
      setTimeout(() => setState('idle'), 7500);
    }
  });

  // Carousel rotation
  setInterval(nextExample, 4000);

  // Init
  setState('idle');
</script>

</body>
</html>
